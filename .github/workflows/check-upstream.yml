name: Check Upstream Updates

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get ComfyUI version
        id: comfyui
        run: |
          LATEST=$(git ls-remote --tags https://github.com/comfyanonymous/ComfyUI.git \
            | grep -E 'refs/tags/v?[0-9]+\.[0-9]+\.[0-9]+$' \
            | awk -F/ '{print $3}' \
            | sort -V \
            | tail -n1)

          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Get Manager commit
        id: manager
        run: |
          LATEST=$(git ls-remote https://github.com/ltdrdata/ComfyUI-Manager.git refs/heads/main \
            | cut -f1)

          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Ensure state file
        run: |
          if [ ! -f .upstream.json ] || ! jq empty .upstream.json 2>/dev/null; then
            echo '{"comfyui":"","manager":"","version":"0.0.0"}' > .upstream.json
          fi

      - name: Detect changes
        id: diff
        run: |
          COMFYUI="${{ steps.comfyui.outputs.latest }}"
          MANAGER="${{ steps.manager.outputs.latest }}"

          OLD_COMFYUI=$(jq -r '.comfyui // ""' .upstream.json)
          OLD_MANAGER=$(jq -r '.manager // ""' .upstream.json)

          echo "comfyui_changed=$([ "$COMFYUI" != "$OLD_COMFYUI" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "manager_changed=$([ "$MANAGER" != "$OLD_MANAGER" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Bump version
        id: version
        if: steps.diff.outputs.comfyui_changed == 'true' ||
          steps.diff.outputs.manager_changed == 'true'
        run: |
          VERSION=$(jq -r '.version // "0.0.0"' .upstream.json)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          PATCH=$((PATCH + 1))

          echo "version=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT

      - name: Update state file
        if: steps.diff.outputs.comfyui_changed == 'true' ||
          steps.diff.outputs.manager_changed == 'true'
        run: |
          jq \
            --arg comfyui "${{ steps.comfyui.outputs.latest }}" \
            --arg manager "${{ steps.manager.outputs.latest }}" \
            --arg version "${{ steps.version.outputs.version }}" \
            '
            .comfyui=$comfyui |
            .manager=$manager |
            .version=$version
            ' .upstream.json > tmp.json

          mv tmp.json .upstream.json

      - name: Commit update
        if: steps.diff.outputs.comfyui_changed == 'true' ||
          steps.diff.outputs.manager_changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .upstream.json
          git commit -m "chore: upstream update → ${{ steps.version.outputs.version }}" || exit 0
          git push
